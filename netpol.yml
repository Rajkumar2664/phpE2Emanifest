---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: myapp-network-policy
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
             matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
              ports:
                - port: 80
                  protocol: TCP

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: app-database
            ports:
              - port: 3306

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
              ports:
                - port: 53
                  protocol: udp 