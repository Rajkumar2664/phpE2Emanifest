---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: myapp-pv
  labels:
    app: myapp-database
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/data/mysql
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""  # Empty string means "match PVCs without storage class"
